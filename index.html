<script type="text/babel">

const H={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`};

const db={
  async get(table,params=""){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}${params}`,{headers:{...H,"Accept":"application/json"}});
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async post(table,body){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:"POST",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(body)});
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async patch(table,params,body){
    const r=await fetch(`${SUPA_URL}/rest/v1/${table}${params}`,{method:"PATCH",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(body)});
    if(!r.ok)throw new Error(await r.text());
    return r.json();
  },
  async del(table,params){
    await fetch(`${SUPA_URL}/rest/v1/${table}${params}`,{method:"DELETE",headers:H});
  }
};

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const CATEGORIES=["Food","Bills","Grocery","Transportation","Medical","Other","Shopping","Savings"];

const CAT_META={
  Food:{icon:"ti-bowl-spoon",bg:"#FFF3E0",text:"#E65100",border:"#FFB74D"},
  Bills:{icon:"ti-file-invoice",bg:"#E8EAF6",text:"#283593",border:"#7986CB"},
  Grocery:{icon:"ti-shopping-cart",bg:"#E8F5E9",text:"#1B5E20",border:"#66BB6A"},
  Transportation:{icon:"ti-car",bg:"#E3F2FD",text:"#0D47A1",border:"#42A5F5"},
  Medical:{icon:"ti-heart-rate-monitor",bg:"#FCE4EC",text:"#880E4F",border:"#F48FB1"},
  Other:{icon:"ti-dots-circle-horizontal",bg:"#F3E5F5",text:"#4A148C",border:"#CE93D8"},
  Shopping:{icon:"ti-shopping-bag",bg:"#FFF8E1",text:"#F57F17",border:"#FFD54F"},
  Savings:{icon:"ti-piggy-bank",bg:"#E0F7FA",text:"#006064",border:"#4DD0E1"},
};
const CAT_CHART={Food:"#FF8A65",Bills:"#7986CB",Grocery:"#66BB6A",Transportation:"#42A5F5",Medical:"#F48FB1",Other:"#CE93D8",Shopping:"#FFD54F",Savings:"#4DD0E1"};

const C={
  navy:"#2C3E6B",navyDark:"#1E2D52",navyLight:"#4A5FA8",
  coral:"#F4845F",coralDark:"#D96B43",coralLight:"#FAD4C4",
  teal:"#1D9E75",tealDark:"#157A5A",tealLight:"#C8EFE1",
  purple:"#7B5EA7",purpleLight:"#EDE7F6",
  amber:"#F59E0B",amberLight:"#FEF3C7",
  red:"#DC2626",redLight:"#FEE2E2",
  gray1:"#F8F8F8",gray2:"#F0F0F0",gray3:"#D0D0D0",gray4:"#888",
  white:"#FFFFFF",text:"#1A1A2E",textMid:"#4A4A6A",textLight:"#888899",
};

const fmtN=(n,cur="AED")=>`${cur} ${Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;

function PieChart({data}){
  const items=data.filter(d=>d.value>0);
  const total=items.reduce((s,d)=>s+d.value,0);
  if(!total)return(
    <div style={{textAlign:"center",padding:"1.5rem",color:C.gray4,fontSize:13}}>
      <i className="ti ti-chart-donut" style={{fontSize:32,display:"block",marginBottom:8,color:C.gray3}}/>
      No AED expenses yet
    </div>
  );
  let angle=-Math.PI/2;
  const slices=items.map(d=>{
    const pct=d.value/total,a1=angle,a2=angle+pct*2*Math.PI;angle=a2;
    const r=68,cx=88,cy=88;
    const x1=Math.cos(a1)*r+cx,y1=Math.sin(a1)*r+cy,x2=Math.cos(a2)*r+cx,y2=Math.sin(a2)*r+cy;
    return{...d,path:`M${cx},${cy} L${x1},${y1} A${r},${r},0,${pct>0.5?1:0},1,${x2},${y2} Z`,pct};
  });
  return(
    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      <svg width="176" height="176" viewBox="0 0 176 176" role="img" aria-label="Spending by category">
        <circle cx="88" cy="88" r="68" fill={C.gray2}/>
        {slices.map((s,i)=><path key={i} d={s.path} fill={CAT_CHART[s.label]||"#ccc"} stroke={C.white} strokeWidth="2"/>)}
        <circle cx="88" cy="88" r="38" fill={C.white}/>
        <text x="88" y="84" textAnchor="middle" fontSize="10" fill={C.gray4}>total</text>
        <text x="88" y="100" textAnchor="middle" fontSize="11" fontWeight="600" fill={C.text}>{Number(total).toFixed(0)}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:100}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>
            <span style={{width:9,height:9,borderRadius:"50%",background:CAT_CHART[s.label]||"#ccc",flexShrink:0}}/>
            <span style={{color:C.textMid,flex:1}}>{s.label}</span>
            <span style={{fontWeight:500,color:C.text}}>{(s.pct*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Isolated input — wrapped in memo so parent re-renders never affect it
// key prop from parent resets it when month changes
const StableInput=React.memo(function StableInput({initialValue,onSave,placeholder,style}){
  const[val,setVal]=React.useState(()=>initialValue!=null?String(initialValue):"");
  const onSaveRef=React.useRef(onSave);
  onSaveRef.current=onSave;
  return React.createElement("input",{
    type:"text",
    inputMode:"decimal",
    pattern:"[0-9]*",
    value:val,
    placeholder:placeholder||"0.00",
    style:style,
    onChange:e=>setVal(e.target.value),
    onBlur:e=>onSaveRef.current(e.target.value),
  });
},()=>true); // always skip re-render — key prop handles resets

function App(){

  const syncQueue=async()=>{
    if(syncing2)return;
    setSyncing2(true);
    let remaining=[];
    let synced=0;
    for(const item of queue){
      try{
        if(item.type==="expense"){
          const res=await db.post("expenses",item.data);
          if(Array.isArray(res)&&res[0]){
            setExpenses(prev=>prev.map(e=>e.id===item.tempId?res[0]:e));
            synced++;
          }
        } else if(item.type==="income"){
          const res=await db.post("income",item.data);
          if(Array.isArray(res)&&res[0]){
            setIncome(prev=>prev.map(e=>e.id===item.tempId?res[0]:e));
            synced++;
          }
        } else if(item.type==="bdo"){
          const res=await db.post("bdo_transactions",item.data);
          if(Array.isArray(res)&&res[0]){
            setBdoTx(prev=>prev.map(e=>e.id===item.tempId?res[0]:e));
            synced++;
          }
        }
      }catch(e){remaining.push(item);}
    }
    saveQueue(remaining);

    setSyncing2(false);
  };

  const toggleSelect=(section,id)=>setSelectedIds(prev=>{
    const s=new Set(prev[section]);

    return{...prev,[section]:s};
  });
  const clearSelection=()=>{setSelectedIds({exp:new Set(),inc:new Set(),bdo:new Set()});setSelectMode(false);};


  const totalSelected=selectedIds.exp.size+selectedIds.inc.size+selectedIds.bdo.size;

  const showToast=(msg,color=C.teal)=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  // Lock body scroll when modal open — prevents scroll-to-top on input focus
  useEffect(()=>{

  const fetchRate=useCallback(async()=>{
    setRateLoading(true);
    try{
      const r=await fetch("https://api.exchangerate-api.com/v4/latest/AED");
      const d=await r.json();
      if(d&&d.rates&&d.rates.PHP){setAedToPhp(d.rates.PHP);}
    }catch(e){setAedToPhp(null);}
    setRateLoading(false);
  },[]);

  const loadAll=useCallback(async()=>{
    setLoading(true);
    try{
      const[exp,inc,bdo,ms,sav]=await Promise.all([
        db.get("expenses","?order=created_at.asc"),
        db.get("income","?order=created_at.asc"),
        db.get("bdo_transactions","?order=date.asc,created_at.asc"),
        db.get("month_settings",""),

      ]);
      setExpenses(Array.isArray(exp)?exp:[]);
      setIncome(Array.isArray(inc)?inc:[]);
      setBdoTx(Array.isArray(bdo)?bdo:[]);

      setMonthSettings(msMap);
      if(Array.isArray(sav)&&sav.length>0)setSavingsState({aed:Number(sav[0].aed),php:Number(sav[0].php)});
    }catch(e){showToast("Connection error — check Supabase",C.red);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    loadAll();
    fetchRate();
    const goOnline=()=>{setIsOnline(true);};
    const goOffline=()=>setIsOnline(false);
    window.addEventListener("online",goOnline);
    window.addEventListener("offline",goOffline);
    return()=>{window.removeEventListener("online",goOnline);window.removeEventListener("offline",goOffline);};
  },[loadAll,fetchRate]);

  // Auto-sync queue when coming back online
  useEffect(()=>{
    if(isOnline&&queue.length>0)syncQueue();
  },[isOnline]);

  // AED expenses — split by pay type
  const monthAEDExp=expenses.filter(e=>e.month===selMonth&&(e.pay_type==="Card"||e.pay_type==="Cash On Hand"));
  const monthCardExp=expenses.filter(e=>e.month===selMonth&&e.pay_type==="Card");
  const monthInc=income.filter(e=>e.month===selMonth);
  const ms=monthSettings[selMonth]||{savings:0,bdo_opening:0,budget_limit:0,withdraw:0};

  // Balance = Income - Card expenses - Withdraw
  // Cash On Hand expenses only affect the cash pool, NOT the balance (withdraw covers them)
  const totalInc=monthInc.reduce((s,x)=>s+Number(x.amount||0),0);
  const totalCardExp=monthCardExp.reduce((s,x)=>s+Number(x.amount||0),0);
  const totalAEDExp=monthAEDExp.reduce((s,x)=>s+Number(x.amount||0),0);
  const withdraw=Number(ms.withdraw||0);
  const balance=totalInc-totalCardExp-withdraw;
  const pctSpent=totalInc>0?((totalCardExp+withdraw)/totalInc*100):0;
  const overspent=balance<0&&totalInc>0;

  // BDO carry-over: auto-calculate opening from previous month's closing
  // Recursively calculate BDO closing balance, carrying over from previous months
  // March (index 2) is the base — uses manually set bdo_opening
  // Every month after that ignores bdo_opening and uses previous month's closing
  const getBDOClosing=(monthIdx)=>{
    const msi=monthSettings[monthIdx]||{};
    // March=3 is the first month with BDO data — use manual bdo_opening
    const opening=monthIdx<=3
      ? Number(msi.bdo_opening||0)
      : getBDOClosing(monthIdx-1); // carry from previous month
    const txs=bdoTx.filter(e=>e.month===monthIdx);
    let bal=opening;
    txs.forEach(tx=>{
      if(tx.tx_type==="deposit") bal+=Number(tx.amount||0);
      else bal-=Number(tx.amount||0);
    });
    return bal;
  };
  // Opening balance for selected month
  const bdoOpening=selMonth<=3
    ? Number(ms.bdo_opening||0)
    : getBDOClosing(selMonth-1);
  const prevMonthClosing=selMonth>3?getBDOClosing(selMonth-1):null;
  const monthBDO=bdoTx.filter(e=>e.month===selMonth);
  let running=bdoOpening;
  const bdoWithRunning=monthBDO.map(tx=>{
    if(tx.tx_type==="deposit") running+=Number(tx.amount||0);
    else running-=Number(tx.amount||0);
    return{...tx,running};
  });
  const totalBDODeposits=monthBDO.filter(t=>t.tx_type==="deposit").reduce((s,x)=>s+Number(x.amount||0),0);
  const totalBDOExpenses=monthBDO.filter(t=>t.tx_type!=="deposit").reduce((s,x)=>s+Number(x.amount||0),0);

  // Cash On Hand tracking — withdraw is the starting pool
  const cashExpenses=monthAEDExp.filter(e=>e.pay_type==="Cash On Hand");
  const totalCashSpent=cashExpenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const cashRemaining=withdraw-totalCashSpent;
  const cashOverspent=totalCashSpent>withdraw&&withdraw>0;

  // Category totals (AED only)
  const catTotals=CATEGORIES.map(c=>({label:c,value:monthAEDExp.filter(e=>e.category===c).reduce((s,x)=>s+Number(x.amount||0),0)}));
  const filteredExp=monthAEDExp.filter(e=>e.pay_type===expTab);

  // Select all helpers — defined here so filteredExp, monthInc, monthBDO are available
  const selectAllExp=(ids)=>setSelectedIds(prev=>({...prev,exp:new Set(ids)}));

  const allBDOSel=monthBDO.length>0&&monthBDO.every(e=>selectedIds.bdo.has(e.id));
  // Master = all visible items across current expense tab + income + BDO

    const bal=inc-expCard-wd;
    const pct=inc>0?((expCard+wd)/inc*100):0;
    return{month:m,income:inc,expenses:exp,savings:Number(msi.savings||0),balance:bal,pct,over:bal<0&&inc>0};

  // ADD EXPENSE (AED) — offline aware

        <i className="ti ti-home-heart" style={{fontSize:28,color:C.white}}/>
      </div>
      <div style={{color:C.navy,fontWeight:500,fontSize:17}}>Our Family Budget</div>

  return(
    <div style={{maxWidth:760,margin:"0 auto",background:"#F5F6FA",minHeight:"100vh"}}>

      {toast&&(
        <div style={{position:"fixed",top:16,right:16,left:16,maxWidth:400,margin:"0 auto",background:toast.color,color:C.white,padding:"12px 18px",borderRadius:12,fontSize:13,fontWeight:500,zIndex:999,textAlign:"center"}}>
          {toast.msg}
        </div>
      )}
      {syncing&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:C.teal,zIndex:998}}/>}
      {syncing2&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:C.amber,zIndex:998}}/>}
      {!isOnline&&(
        <div style={{background:C.amber,color:C.white,padding:"8px 16px",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <i className="ti ti-wifi-off" style={{fontSize:14}}/> You are offline — entries will sync when connected
          </div>
          {queue.length>0&&<span style={{background:"rgba(0,0,0,0.2)",borderRadius:6,padding:"2px 8px"}}>{queue.length} pending</span>}
        </div>
      )}
      {isOnline&&queue.length>0&&(
        <div style={{background:C.teal,color:C.white,padding:"8px 16px",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <i className="ti ti-wifi" style={{fontSize:14}}/> Back online — {queue.length} item{queue.length>1?"s":""} pending sync
          </div>
          <button onClick={syncQueue} disabled={syncing2} style={{background:"rgba(255,255,255,0.2)",border:"none",color:C.white,borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:500}}>
            {syncing2?"Syncing...":"Sync now"}
          </button>
        </div>
      )}

          <div style={{display:"flex",alignItems:"center",gap:10}}>

            </div>

              <button key={v} onClick={()=>setView(v)} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 10px",borderRadius:9,background:view===v?C.coral:"transparent",color:view===v?C.white:"#9AAAC8",border:"none",fontWeight:view===v?500:400,fontSize:12}}>
                <i className={`ti ${icon}`} aria-hidden="true" style={{fontSize:14}}/><span className="hide-mobile">{label}</span>
              </button>

              <i className="ti ti-settings" aria-hidden="true"/>
            </button>
          </div>
        </div>

            <MC label="Balance" value={fmtN(balance,"AED")} icon="ti-scale" bg={balance>=0?"#EEF0FB":C.redLight} ic={balance>=0?C.navyLight:C.red} vc={balance>=0?C.navy:C.red}/>

            const prevCardExp=prevMonth>=1?expenses.filter(e=>e.month===prevMonth&&e.pay_type==="Card").reduce((s,x)=>s+Number(x.amount||0),0):null;
            const prevCatTotals=prevMonth>=1?CATEGORIES.map(c=>({label:c,value:expenses.filter(e=>e.month===prevMonth&&e.category===c&&(e.pay_type==="Card"||e.pay_type==="Cash On Hand")).reduce((s,x)=>s+Number(x.amount||0),0)})):null;

            // Top category this month
            const topCat=[...catTotals].filter(c=>c.value>0).sort((a,b)=>b.value-a.value)[0];

            // Biggest single expense
            const biggestExp=[...monthAEDExp].sort((a,b)=>Number(b.amount)-Number(a.amount))[0];

            // Month vs last month change
            const totalChange=prevCardExp!==null&&prevCardExp>0?((totalCardExp-prevCardExp)/prevCardExp*100):null;

            // Category changes vs last month
            const catChanges=prevCatTotals?CATEGORIES.map(c=>{
              const cur=catTotals.find(x=>x.label===c)?.value||0;
              const prev=prevCatTotals.find(x=>x.label===c)?.value||0;
              if(cur===0&&prev===0)return null;
              return{label:c,cur,prev,change:prev>0?((cur-prev)/prev*100):null,diff:cur-prev};
            }).filter(Boolean).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,3):[];

            const cm=topCat?CAT_META[topCat.label]||CAT_META.Other:null;
            return(
              <Card>
                <div style={{fontSize:11,fontWeight:500,color:C.textLight,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                  <i className="ti ti-bulb" style={{color:C.amber,fontSize:14}}/> SPENDING INSIGHTS
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:10}}>

                  {/* Top spending category */}
                  {topCat&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:cm.bg,borderRadius:12,border:`1.5px solid ${cm.border}`}}>
                      <div style={{width:36,height:36,borderRadius:10,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${cm.border}`}}>
                        <i className={`ti ${cm.icon}`} style={{fontSize:16,color:cm.text}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,color:cm.text,fontWeight:500}}>Top spend: {topCat.label}</div>
                        <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{fmtN(topCat.value,"AED")} · {totalCardExp>0?((topCat.value/totalCardExp)*100).toFixed(0):0}% of card expenses</div>
                      </div>
                    </div>
                  )}

                  {/* Month vs last month */}
                  {totalChange!==null&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:totalChange>0?C.redLight:C.tealLight,borderRadius:12,border:`1.5px solid ${totalChange>0?"#FCA5A5":"#A7D7C5"}`}}>
                      <div style={{width:36,height:36,borderRadius:10,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${totalChange>0?"#FCA5A5":"#A7D7C5"}`}}>

                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:500,color:totalChange>0?C.red:C.teal}}>

                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontWeight:500,fontSize:13,color:C.text}}>AED {Number(e.amount).toFixed(2)}</div>
                        {!selectMode&&<button onClick={ev=>{ev.preventDefault();ev.stopPropagation();delExp(e.id);}} style={{background:"none",border:"none",color:C.gray3,fontSize:14,padding:"2px 0",marginTop:2}}><i className="ti ti-trash" aria-hidden="true"/></button>}
                      </div>
                    </div>

                <div style={{textAlign:"right",paddingTop:8,borderTop:`1.5px solid ${C.gray3}`,fontSize:13,fontWeight:500,color:C.coral}}>

              <div style={{fontSize:12,color:C.textMid,marginBottom:16}}>Choose what to export. Layout matches your original Excel sheet.</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={()=>exportExcel(selMonth)} style={{padding:"14px",borderRadius:12,border:`1.5px solid ${C.teal}`,background:C.tealLight,color:C.tealDark,fontWeight:500,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <i className="ti ti-file-spreadsheet" style={{fontSize:18}}/> Export {MONTHS[selMonth-1]} only
                </button>
                <button onClick={()=>exportExcel(-1)} style={{padding:"14px",borderRadius:12,border:`1.5px solid ${C.navy}`,background:"#EEF0FB",color:C.navy,fontWeight:500,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <i className="ti ti-table" style={{fontSize:18}}/> Export all months (separate sheets)
                </button>
                <button onClick={()=>{setModal(null);}} style={{padding:"13px",borderRadius:12,border:`1.5px solid ${C.gray3}`,background:C.white,color:C.textMid,fontSize:14}}>Cancel</button>
              </div>
            </>}

            {modal==="settings"&&<>
              <div style={{fontWeight:500,fontSize:15,marginBottom:16,color:C.text}}>Settings</div>
              <div style={{background:C.tealLight,border:`1px solid #A7D7C5`,borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:13,color:C.tealDark}}>
                <i className="ti ti-cloud" aria-hidden="true" style={{marginRight:6}}/>
                Connected to Supabase — syncs across all devices.
              </div>
              <div style={{fontSize:13,color:C.textMid,marginBottom:16,background:"#EEF0FB",padding:"10px 12px",borderRadius:10,border:`1px solid #C5CAE9`,lineHeight:1.7}}>
                <strong style={{color:C.text,display:"block",marginBottom:4}}>Install on phone</strong>
                iPhone: Safari → Share → "Add to Home Screen"<br/>
                Android: Chrome → Menu → "Install App"
              </div>
              <button onClick={()=>setModal(null)} style={{width:"100%",padding:"13px",borderRadius:12,border:`1.5px solid ${C.gray3}`,background:C.white,color:C.textMid,fontSize:14}}>Close</button>
            </>}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
// Cache the app HTML on first load so it works offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js')
    .then(()=>console.log('SW registered'))
    .catch(e=>console.log('SW error:',e));
}

// Fallback: also cache this page manually in Cache API
if('caches' in window){
  window.addEventListener('load',()=>{
    caches.open('family-budget-v2').then(cache=>{
      cache.add(window.location.href).catch(()=>{});
    });
  });
}
</script>
</body>
</html>

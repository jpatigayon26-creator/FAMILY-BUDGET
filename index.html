function PieChart({data}){
  const items=data.filter(d=>d.value>0);
  const total=items.reduce((s,d)=>s+d.value,0);
  if(!total)return(
    <div style={{textAlign:"center",padding:"1.5rem",color:C.gray4,fontSize:13}}>
      <i className="ti ti-chart-donut" style={{fontSize:32,display:"block",marginBottom:8,color:C.gray3}}/>
      No AED expenses yet
    </div>
  );
  let angle=-Math.PI/2;
  const slices=items.map(d=>{
    const pct=d.value/total,a1=angle,a2=angle+pct*2*Math.PI;angle=a2;
    const r=68,cx=88,cy=88;
    const x1=Math.cos(a1)*r+cx,y1=Math.sin(a1)*r+cy,x2=Math.cos(a2)*r+cx,y2=Math.sin(a2)*r+cy;
    return{...d,path:`M${cx},${cy} L${x1},${y1} A${r},${r},0,${pct>0.5?1:0},1,${x2},${y2} Z`,pct};
  });
  return(
    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      <svg width="176" height="176" viewBox="0 0 176 176" role="img" aria-label="Spending by category">
        <circle cx="88" cy="88" r="68" fill={C.gray2}/>
        {slices.map((s,i)=><path key={i} d={s.path} fill={CAT_CHART[s.label]||"#ccc"} stroke={C.white} strokeWidth="2"/>)}
        <circle cx="88" cy="88" r="38" fill={C.white}/>
        <text x="88" y="84" textAnchor="middle" fontSize="10" fill={C.gray4}>total</text>
        <text x="88" y="100" textAnchor="middle" fontSize="11" fontWeight="600" fill={C.text}>{Number(total).toFixed(0)}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:100}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>
            <span style={{width:9,height:9,borderRadius:"50%",background:CAT_CHART[s.label]||"#ccc",flexShrink:0}}/>
            <span style={{color:C.textMid,flex:1}}>{s.label}</span>
            <span style={{fontWeight:500,color:C.text}}>{(s.pct*100).toFixed(0)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Isolated input — wrapped in memo so parent re-renders never affect it
// key prop from parent resets it when month changes
const StableInput=React.memo(function StableInput({initialValue,onSave,placeholder,style,disabled}){
  const[val,setVal]=React.useState(()=>initialValue!=null?String(initialValue):"");
  const onSaveRef=React.useRef(onSave);
  onSaveRef.current=onSave;
  return React.createElement("input",{
    type:"text",
    inputMode:"decimal",
    pattern:"[0-9]*",
    value:val,
    placeholder:placeholder||"0.00",
    disabled:!!disabled,
    style:{...style,...(disabled?{background:"#F3F4F6",color:"#9CA3AF",cursor:"not-allowed",opacity:0.7}:{})},
    onChange:e=>!disabled&&setVal(e.target.value),
    onBlur:e=>!disabled&&onSaveRef.current(e.target.value),
  });
},(prev,next)=>prev.disabled===next.disabled); // only re-render when disabled changes

      addSection("💚  INCOME",TEA,["Date","Amount (AED)","Description",""],

                      <td style={{padding:"8px 5px",color:r.over?C.red:C.teal,fontWeight:500}}>{r.income?(hideValues?"••••":`${r.balance.toFixed(0)}`):"—"}</td>

                      <td style={{padding:"8px 5px"}}>{r.income>0?<><span style={{fontSize:11,fontWeight:500,color:r.pct>=100?C.red:r.pct>=85?C.amber:C.teal}}>{hideValues?"••":r.pct.toFixed(0)+"%"}</span>{!hideValues&&<PB pct={r.pct}/>}</>:"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:8,fontSize:11,color:C.textLight,textAlign:"center"}}>Tap any month to open it</div>
          </Card>

          {/* Bible Verse of the Day */}
          <div style={{background:"linear-gradient(135deg, #2D4A3E 0%, #1E3A2F 100%)",borderRadius:18,padding:"1.5rem",position:"relative",overflow:"hidden"}}>
            {/* Decorative circles */}
            <div style={{position:"absolute",top:-30,right:-30,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,0.04)"}}/>
            <div style={{position:"absolute",bottom:-40,left:-20,width:100,height:100,borderRadius:"50%",background:"rgba(255,255,255,0.03)"}}/>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:34,height:34,borderRadius:10,background:"rgba(212,175,90,0.2)",border:"1px solid rgba(212,175,90,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <i className="ti ti-book" style={{fontSize:16,color:"#D4AF5A"}}/>
                </div>
                <div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.45)",fontWeight:600,letterSpacing:1.5}}>VERSE OF THE DAY</div>
                  <div style={{fontSize:12,color:"#D4AF5A",fontWeight:600,marginTop:1}}>{bibleVerse?.reference}</div>
                </div>
              </div>
              <button onClick={()=>setBibleVerse(VERSES[(VERSES.indexOf(bibleVerse)+1)%VERSES.length])} title="Next verse" style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                <i className="ti ti-chevrons-right" style={{fontSize:14,color:"rgba(255,255,255,0.5)"}}/>
              </button>
            </div>
            {/* Divider */}
            <div style={{height:1,background:"rgba(255,255,255,0.08)",marginBottom:16}}/>
            {/* English verse */}
            <p style={{fontSize:13,color:"rgba(255,255,255,0.92)",lineHeight:1.75,fontStyle:"italic",margin:"0 0 10px",fontWeight:300,letterSpacing:0.2}}>"{bibleVerse?.english}"</p>
            {/* Tagalog verse */}
            <p style={{fontSize:11.5,color:"rgba(255,255,255,0.55)",lineHeight:1.7,fontStyle:"italic",margin:"0 0 16px",fontWeight:300}}>"{bibleVerse?.tagalog}"</p>
            {/* Reflection */}
            <div style={{background:"rgba(212,175,90,0.08)",border:"1px solid rgba(212,175,90,0.15)",borderRadius:10,padding:"10px 13px",display:"flex",gap:8,alignItems:"flex-start"}}>
              <i className="ti ti-feather" style={{fontSize:13,color:"#D4AF5A",marginTop:2,flexShrink:0}}/>
              <p style={{fontSize:11,color:"rgba(255,255,255,0.65)",margin:0,lineHeight:1.65,fontStyle:"normal"}}>{bibleVerse?.reflection}</p>
            </div>
          </div>

        </div>
      )}

      {/* ── MONTHLY ── */}
      {view==="monthly"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Month nav */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setSelMonth(m=>Math.max(1,m-1))} disabled={selMonth<=1} style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:`1.5px solid ${C.gray3}`,background:C.white,color:C.text,opacity:selMonth<=1?0.35:1,flexShrink:0}}>
              <i className="ti ti-chevron-left" aria-hidden="true" style={{fontSize:18,color:C.text}}/>
            </button>
            <select value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))} style={{flex:1,fontWeight:500,fontSize:15,borderRadius:10,border:`1.5px solid ${C.gray3}`,padding:"8px 12px",background:C.white,color:C.text}}>
              {MONTHS.map((m,i)=><option key={i} value={i+1}>{m} 2026</option>)}
            </select>
            <button onClick={()=>setSelMonth(m=>Math.min(11,m+1))} disabled={selMonth===11} style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:`1.5px solid ${C.gray3}`,background:C.white,color:C.text,opacity:selMonth===11?0.35:1,flexShrink:0}}>
              <i className="ti ti-chevron-right" aria-hidden="true" style={{fontSize:18,color:C.text}}/>
            </button>
            <button onClick={()=>toggleLock(selMonth)} style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",border:`1.5px solid ${isMonthLocked?C.amber:C.gray3}`,background:isMonthLocked?"#FFF8E7":C.white,color:isMonthLocked?C.amber:C.textLight,flexShrink:0}} title={isMonthLocked?"Unlock month":"Lock month"}>
              <i className={`ti ${isMonthLocked?"ti-lock":"ti-lock-open"}`} style={{fontSize:17}}/>
            </button>
          </div>
          {isMonthLocked&&(
            <div style={{display:"flex",alignItems:"center",gap:8,background:"#FFF8E7",border:"1.5px solid "+C.amber,borderRadius:12,padding:"10px 14px",fontSize:13,color:C.amber,fontWeight:500}}>
              <i className="ti ti-lock" style={{fontSize:16}}/> This month is locked. Tap the lock icon to unlock and edit.
            </div>
          )}

          {/* Overspend alert */}
          {overspent&&(
            <div style={{background:C.redLight,border:`1.5px solid #FCA5A5`,borderRadius:12,padding:"0.85rem 1rem",display:"flex",alignItems:"center",gap:10,color:C.red}}>
              <i className="ti ti-alert-triangle" aria-hidden="true" style={{fontSize:20,flexShrink:0}}/>
              <div>
                <div style={{fontWeight:500,fontSize:13}}>Overspending this month</div>
                <div style={{fontSize:12,color:"#B91C1C"}}>You are over by {fmt(Math.abs(balance),"AED")}</div>
              </div>
            </div>
          )}

          {/* Metric cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
            <MC label="Total income" value={fmt(totalInc,"AED")} icon="ti-cash" bg={C.tealLight} ic={C.teal} vc={C.tealDark}/>
            <MC label="Card expenses" value={fmt(totalCardExp,"AED")} icon="ti-credit-card" bg={C.coralLight} ic={C.coral} vc={C.coralDark} sub="Deducted from balance"/>
            <MC label="Withdraw / Cash" value={fmt(withdraw,"AED")} icon="ti-cash-banknote" bg={cashOverspent?C.redLight:C.amberLight} ic={cashOverspent?C.red:C.amber} vc={cashOverspent?C.red:"#92400E"} sub={withdraw>0?`AED ${cashRemaining.toFixed(2)} remaining cash`:"Set withdraw in settings"}/>
            <MC label="Balance" value={fmt(balance,"AED")} icon="ti-scale" bg={balance>=0?"#EEF0FB":C.redLight} ic={balance>=0?C.navyLight:C.red} vc={balance>=0?C.navy:C.red}/>
          </div>

          {/* ── Spending Insights ── */}
          {totalCardExp>0&&(()=>{
            // Previous month data
            const prevMonth=selMonth-1;
            const prevCardExp=prevMonth>=1?expenses.filter(e=>e.month===prevMonth&&e.pay_type==="Card").reduce((s,x)=>s+Number(x.amount||0),0):null;
            const prevCatTotals=prevMonth>=1?CATEGORIES.map(c=>({label:c,value:expenses.filter(e=>e.month===prevMonth&&e.category===c&&(e.pay_type==="Card"||e.pay_type==="Cash On Hand")).reduce((s,x)=>s+Number(x.amount||0),0)})):null;

            // Top category this month
            const topCat=[...catTotals].filter(c=>c.value>0).sort((a,b)=>b.value-a.value)[0];

            // Biggest single expense
            const biggestExp=[...monthAEDExp].sort((a,b)=>Number(b.amount)-Number(a.amount))[0];

            // Month vs last month change
            const totalChange=prevCardExp!==null&&prevCardExp>0?((totalCardExp-prevCardExp)/prevCardExp*100):null;

            // Category changes vs last month
            const catChanges=prevCatTotals?CATEGORIES.map(c=>{
              const cur=catTotals.find(x=>x.label===c)?.value||0;
              const prev=prevCatTotals.find(x=>x.label===c)?.value||0;
              if(cur===0&&prev===0)return null;
              return{label:c,cur,prev,change:prev>0?((cur-prev)/prev*100):null,diff:cur-prev};
            }).filter(Boolean).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,3):[];

            const cm=topCat?CAT_META[topCat.label]||CAT_META.Other:null;
            return(
              <Card>
                <div style={{fontSize:11,fontWeight:500,color:C.textLight,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                  <i className="ti ti-bulb" style={{color:C.amber,fontSize:14}}/> SPENDING INSIGHTS
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:10}}>

                  {/* Top spending category */}
                  {topCat&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:cm.bg,borderRadius:12,border:`1.5px solid ${cm.border}`}}>
                      <div style={{width:36,height:36,borderRadius:10,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${cm.border}`}}>
                        <i className={`ti ${cm.icon}`} style={{fontSize:16,color:cm.text}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,color:cm.text,fontWeight:500}}>Top spend: {topCat.label}</div>
                        <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{fmt(topCat.value,"AED")} · {totalCardExp>0?((topCat.value/totalCardExp)*100).toFixed(0):0}% of card expenses</div>
                      </div>
                    </div>
                  )}

                  {/* Month vs last month */}
                  {totalChange!==null&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:totalChange>0?C.redLight:C.tealLight,borderRadius:12,border:`1.5px solid ${totalChange>0?"#FCA5A5":"#A7D7C5"}`}}>
                      <div style={{width:36,height:36,borderRadius:10,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${totalChange>0?"#FCA5A5":"#A7D7C5"}`}}>
                        <i className={`ti ${totalChange>0?"ti-trending-up":"ti-trending-down"}`} style={{fontSize:16,color:totalChange>0?C.red:C.teal}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:500,color:totalChange>0?C.red:C.teal}}>
                          {Math.abs(totalChange).toFixed(0)}% {totalChange>0?"more":"less"} than {MONTHS[prevMonth-1]}
                        </div>
                        <div style={{fontSize:11,color:C.textLight,marginTop:2}}>
                          {totalChange>0?"Spending up":"Spending down"} by {fmt(Math.abs(totalCardExp-prevCardExp),"AED")}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Biggest single expense */}
                  {biggestExp&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.gray1,borderRadius:12,border:`1.5px solid ${C.gray3}`}}>
                      <div style={{width:36,height:36,borderRadius:10,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${C.gray3}`}}>
                        <i className="ti ti-receipt" style={{fontSize:16,color:C.textMid}}/>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Biggest: {biggestExp.description}</div>
                        <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{fmt(Number(biggestExp.amount),"AED")} · {biggestExp.category}</div>
                      </div>
                    </div>
                  )}

                  {/* Top category changes vs last month */}
                  {catChanges.length>0&&(
                    <div style={{marginTop:2}}>
                      <div style={{fontSize:11,color:C.textLight,marginBottom:6,fontWeight:500}}>vs {MONTHS[prevMonth-1]}</div>
                      {catChanges.map(c=>{
                        const ccm=CAT_META[c.label]||CAT_META.Other;
                        const up=c.diff>0;
                        return(
                          <div key={c.label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <i className={`ti ${ccm.icon}`} style={{fontSize:13,color:ccm.text,width:16,textAlign:"center"}}/>
                            <span style={{fontSize:12,color:C.textMid,flex:1}}>{c.label}</span>
                            <span style={{fontSize:12,fontWeight:500,color:up?C.red:C.teal}}>
                              {up?"+":""}{fmt(c.diff,"AED")}
                            </span>
                            {c.change!==null&&(
                              <span style={{fontSize:10,color:C.textLight,background:up?C.redLight:C.tealLight,padding:"1px 6px",borderRadius:5}}>
                                {up?"+":""}{c.change.toFixed(0)}%
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                </div>
              </Card>
            );
          })()}

          {/* Savings + budget limit inputs */}
          <Card>
            <SL icon="ti-adjustments" text="Month settings"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}} className="grid-2">
              <div>
                <label style={lbl}><i className="ti ti-piggy-bank" aria-hidden="true" style={{color:C.purple,marginRight:4}}/>Savings set aside (AED)</label>
                <StableInput key={`sav-${selMonth}`} initialValue={ms.savings} onSave={v=>updateMS({savings:Number(v)})} placeholder="0.00" disabled={isMonthLocked} style={{...inp,marginBottom:0}}/>
                <div style={{fontSize:10,color:C.textLight,marginTop:3}}>Already deducted from income — display only</div>
              </div>
              <div>
                <label style={lbl}><i className="ti ti-cash-banknote" aria-hidden="true" style={{color:C.amber,marginRight:4}}/>Withdraw amount (AED)</label>
                <StableInput key={`wd-${selMonth}`} initialValue={ms.withdraw} onSave={v=>updateMS({withdraw:Number(v)})} placeholder="0.00" disabled={isMonthLocked} style={{...inp,marginBottom:0}}/>
                <div style={{fontSize:10,color:C.textLight,marginTop:3}}>Deducted from income in balance</div>
              </div>
              <div>
                <label style={lbl}><i className="ti ti-target" aria-hidden="true" style={{color:C.coral,marginRight:4}}/>Budget limit (AED)</label>
                <StableInput key={`bl-${selMonth}`} initialValue={ms.budget_limit} onSave={v=>updateMS({budget_limit:Number(v)})} placeholder="0.00" disabled={isMonthLocked} style={{...inp,marginBottom:0}}/>
              </div>

            </div>
            {ms.budget_limit>0&&(
              <div style={{marginTop:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}>
                  <span style={{color:C.textMid}}>Budget used (expenses only)</span>
                  <span style={{fontWeight:500,color:pctSpent>=100?C.red:pctSpent>=85?C.amber:C.teal}}>{pctSpent.toFixed(0)}%</span>
                </div>
                <PB pct={pctSpent}/>
                {totalCardExp>ms.budget_limit&&<div style={{fontSize:11,color:C.red,marginTop:5}}>Over budget by {fmt(totalCardExp-ms.budget_limit,"AED")}</div>}
              </div>
            )}
          </Card>

          {/* Budget used bar (always visible) */}
          {!ms.budget_limit&&(
            <Card style={{padding:"1rem 1.25rem"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:12}}>
                <span style={{color:C.textMid,fontWeight:500}}>Income used (expenses + withdraw)</span>
                <span style={{fontWeight:500,color:pctSpent>=100?C.red:pctSpent>=85?C.amber:C.teal}}>{pctSpent.toFixed(0)}%</span>
              </div>
              <PB pct={pctSpent}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:10,color:C.textLight}}>
                <span>AED 0</span><span>{fmt(totalInc,"AED")}</span>
              </div>
            </Card>
          )}

          {/* Pie chart */}
          <Card>
            <SL icon="ti-chart-donut" text="AED spending by category"/>
            <PieChart data={catTotals}/>
          </Card>

          {/* Action buttons */}
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            {!isMonthLocked&&<button onClick={()=>{if(selectMode)clearSelection();else setSelectMode(true);}} style={{flex:1,padding:"13px 16px",borderRadius:12,border:`1.5px solid ${selectMode?C.red:C.gray3}`,background:selectMode?C.redLight:C.white,color:selectMode?C.red:C.textMid,fontWeight:500,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              <i className={`ti ${selectMode?"ti-x":"ti-select"}`} aria-hidden="true" style={{fontSize:17}}/>{selectMode?"Cancel":"Select"}
            </button>}
            <button onClick={()=>setModal("export")} style={{flex:1,padding:"13px 16px",borderRadius:12,border:`1.5px solid ${C.teal}`,background:C.tealLight,color:C.tealDark,fontWeight:500,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
              <i className="ti ti-file-spreadsheet" aria-hidden="true" style={{fontSize:17}}/>Export
            </button>
          </div>

          {/* Floating delete bar */}
          {selectMode&&(
            <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:totalSelected>0?C.red:"#444",color:C.white,borderRadius:14,padding:"11px 16px",display:"flex",alignItems:"center",gap:8,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.3)",whiteSpace:"nowrap"}}>
              <button onClick={allMasterSel?()=>setSelectedIds({exp:new Set(),inc:new Set(),bdo:new Set()}):selectMaster} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:C.white,borderRadius:8,padding:"6px 12px",fontWeight:500,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                <i className={`ti ${allMasterSel?"ti-checkbox":"ti-square"}`}/>{allMasterSel?"Deselect all":"All"}
              </button>
              <span style={{fontWeight:500,fontSize:13}}>{totalSelected} selected</span>
              {totalSelected>0&&<button onClick={delSelected} style={{background:"rgba(255,255,255,0.2)",border:"none",color:C.white,borderRadius:8,padding:"6px 14px",fontWeight:500,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                <i className="ti ti-trash"/> Delete
              </button>}
            </div>
          )}

          {/* Expense tabs: Card / Cash On Hand */}
          <Card>
            <SL icon="ti-list" text="AED Expenses"/>
            <div style={{display:"flex",gap:4,marginBottom:14,background:C.gray2,borderRadius:10,padding:4}}>
              {AED_PAY_TYPES.map(t=>(
                <button key={t} onClick={()=>setExpTab(t)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",fontSize:12,fontWeight:expTab===t?500:400,background:expTab===t?C.navy:C.gray2,color:expTab===t?C.white:C.textMid}}>
                  {t}
                </button>
              ))}
            </div>
            {expTab==="Cash On Hand"&&(
              <>
                {/* Cash on hand summary card */}
                <div style={{background:withdraw>0?"#FFFBEB":C.gray1,border:`1.5px solid ${withdraw>0?"#FDE68A":C.gray3}`,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:500,color:C.amber,marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                    <i className="ti ti-cash-banknote" aria-hidden="true"/> CASH ON HAND BREAKDOWN
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.textLight,marginBottom:3}}>Withdrawn</div>
                      <div style={{fontSize:14,fontWeight:500,color:"#92400E"}}>{fmt(withdraw,"AED")}</div>
                    </div>
                    <div style={{textAlign:"center",borderLeft:`1px solid #FDE68A`,borderRight:`1px solid #FDE68A`}}>
                      <div style={{fontSize:10,color:C.textLight,marginBottom:3}}>Spent</div>
                      <div style={{fontSize:14,fontWeight:500,color:C.coral}}>{fmt(totalCashSpent,"AED")}</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.textLight,marginBottom:3}}>Remaining</div>
                      <div style={{fontSize:14,fontWeight:500,color:cashRemaining>=0?C.teal:C.red}}>{fmt(cashRemaining,"AED")}</div>
                    </div>
                  </div>
                  {withdraw>0&&(
                    <div style={{marginTop:10}}>
                      <div style={{height:6,background:C.gray2,borderRadius:99,overflow:"hidden",border:`1px solid #FDE68A`}}>
                        <div style={{height:"100%",width:`${Math.min(100,(totalCashSpent/withdraw)*100)}%`,background:cashOverspent?C.red:C.amber,borderRadius:99,transition:"width 0.3s"}}/>
                      </div>
                      <div style={{fontSize:10,color:C.textLight,marginTop:3,textAlign:"right"}}>
                        {withdraw>0?((totalCashSpent/withdraw)*100).toFixed(0):0}% of withdraw used
                      </div>
                    </div>
                  )}
                  {withdraw===0&&(
                    <div style={{fontSize:11,color:C.textLight,marginTop:6,textAlign:"center"}}>
                      Set a withdraw amount in Month Settings to track cash
                    </div>
                  )}
                </div>
                {/* Overspent cash warning */}
                {cashOverspent&&(
                  <div style={{background:"#FEF2F2",border:`1.5px solid #FCA5A5`,borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:8,color:C.red}}>
                    <i className="ti ti-alert-triangle" aria-hidden="true" style={{fontSize:18,flexShrink:0}}/>
                    <div>
                      <div style={{fontWeight:500,fontSize:12}}>Cash overspent!</div>
                      <div style={{fontSize:11,color:"#B91C1C"}}>You spent {fmt(totalCashSpent-withdraw,"AED")} more than you withdrew</div>
                    </div>
                  </div>
                )}
              </>
            )}
            {filteredExp.length===0?(
              <div style={{textAlign:"center",padding:"1.5rem",color:C.textLight,fontSize:13}}>
                <i className="ti ti-receipt-off" aria-hidden="true" style={{fontSize:28,display:"block",marginBottom:8,color:C.gray3}}/>
                No {expTab} expenses this month
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {selectMode&&filteredExp.length>0&&(

<script>
// Cache the app HTML on first load so it works offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js')
    .then(()=>console.log('SW registered'))
    .catch(e=>console.log('SW error:',e));
}

// Fallback: also cache this page manually in Cache API
if('serviceWorker' in navigator){
  // Inline service worker for notifications + caching
  const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => e.waitUntil(clients.claim()));
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  e.respondWith(
    caches.open('ja-budget-v1').then(cache =>
      cache.match(e.request).then(cached => {
        const fresh = fetch(e.request).then(resp => { cache.put(e.request, resp.clone()); return resp; });
        return cached || fresh;
      })
    )
  );
});
self.addEventListener('notificationclick', e => { e.notification.close(); });
`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(reg => {
    // Schedule daily 9PM notification
    const scheduleNotif = () => {
      if(Notification.permission !== 'granted') return;
      const now = new Date();
      const target = new Date();
      target.setHours(21, 0, 0, 0);
      if(now >= target) target.setDate(target.getDate() + 1);
      const ms = target - now;
      setTimeout(() => {
        reg.showNotification('💸 Family Budget Reminder', {
          body: "Don't forget to log today's expenses! Stay on track 📊",
          icon: 'data:image/png;base64,iVBORw0KGgo=',
          badge: 'data:image/png;base64,iVBORw0KGgo=',
          tag: 'daily-reminder',
          renotify: true
        });
        scheduleNotif();
      }, ms);
    };
    if(Notification.permission === 'granted') {
      scheduleNotif();
    } else if(Notification.permission !== 'denied') {
      Notification.requestPermission().then(p => { if(p==='granted') scheduleNotif(); });
    }
  }).catch(()=>{});
}
if('caches' in window){
  window.addEventListener('load',()=>{
    caches.open('ja-budget-v1').then(cache=>{
      cache.add(window.location.href).catch(()=>{});
    });
  });
}
</script>
